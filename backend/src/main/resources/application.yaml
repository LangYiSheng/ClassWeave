spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/classweave?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  servlet:
    context-path: /
  port: ${PORT:8080}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:classweave-classweave-classweave-classweave-secret-key}
      expiration-hours: ${JWT_EXPIRATION_HOURS:72}
  share:
    base-url: ${SHARE_BASE_URL:http://localhost:8080/share}
