spring:
  datasource:
    url: jdbc:h2:mem:classweave;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

app:
  security:
    jwt:
      secret: test-test-test-test-test-test-test-test-secret
      expiration-hours: 72
  share:
    base-url: http://localhost:8080/share
